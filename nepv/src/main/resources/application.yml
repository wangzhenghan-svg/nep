
  server:
    port: 8040

  spring:
    datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://127.0.0.1:3306/nep?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
      username: root
      password: 123456

  mybatis-plus:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: com.neusoft.yth.nepBackend.entity
    configuration:
      map-underscore-to-camel-case: true

  logging:
    level:
      root: error
      com.neusoft.yth.nepBackend.nepv: debug
