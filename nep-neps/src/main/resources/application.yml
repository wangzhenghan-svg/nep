server:
  port: 8083

spring:
  application:
    name: nep-neps
  datasource:
    url: jdbc:mysql://localhost:3306/nep_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.neusoft.yth.nepBackend.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.neusoft.yth.nepBackend.neps: debug
